<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Dzīvā galerija</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #fff;
    color: #1a1a1a;
    overflow-x: hidden;
}

h1, h2, h3, p { margin: 0; padding: 0; }

/* HEADER */
header {
    padding: 2rem 4rem;
    background: white;
    border-bottom: 1px solid #e5e5e5;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h1 { font-size: 1rem; font-weight: 500; }
nav ul { list-style: none; display: flex; gap: 2rem; }
nav a { text-decoration: none; color: #666; }
nav a:hover { color: #1a1a1a; }

/* HERO */
.hero {
    padding: 4rem 4rem 2rem;
    text-align: center;
}

.hero h2 { font-size: 2.5rem; margin-bottom: 1rem; }
.hero p { font-size: 1.25rem; color: #666; }

/* GALERIJA - DZĪVA KAUDZE */
.portfolio {
    position: relative;
    height: 500px; /* augstums galerijai */
    overflow: hidden;
    padding: 2rem;
}

.gallery img {
    position: absolute;
    width: 300px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s, z-index 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* Hover efekts - palielina un paceļ priekšplānā */
.gallery img:hover {
    transform: scale(1.2) rotate(0deg);
    z-index: 100;
}

/* Automātiska neliela kustība */
@keyframes float1 {
    0% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(10px,5px) rotate(2deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

@keyframes float2 {
    0% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(-8px,7px) rotate(-3deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

@keyframes float3 {
    0% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(5px,-6px) rotate(1deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

/* Katram attēlam savs sākuma pozīcijas un animācija */
#img1 { top: 50px; left: 100px; animation: float1 6s ease-in-out infinite; }
#img2 { top: 100px; left: 250px; animation: float2 5s ease-in-out infinite; }
#img3 { top: 150px; left: 400px; animation: float3 7s ease-in-out infinite; }
#img4 { top: 50px; left: 550px; animation: float1 6s ease-in-out infinite; }
#img5 { top: 120px; left: 700px; animation: float2 5s ease-in-out infinite; }
#img6 { top: 80px; left: 850px; animation: float3 7s ease-in-out infinite; }

/* FOOTER */
footer {
    background: white;
    border-top: 1px solid #e5e5e5;
    padding: 3rem 4rem;
    margin-top: 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

footer a { color: #666; text-decoration: none; }
footer a:hover { color: #1a1a1a; }

</style>
</head>
<body>

<header>
    <nav>
        <h1>Katrīna Līva Dalbiņa</h1>
        <ul>
            <li><a href="#">Sākums</a></li>
            <li><a href="#">Par mani</a></li>
            <li><a href="#">Kontakti</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="hero">
        <h2>Māksliniece<br>un programmētāja</h2>
        <p>Radu interaktīvas pieredzes, kurās māksla satiekas ar tehnoloģijām.</p>
    </section>

    <section class="portfolio">
        <h2>Izvēlētie darbi</h2>
        <div class="gallery">
            <img id="img1" src="https://via.placeholder.com/300x200?text=1" alt="Darbs 1">
            <img id="img2" src="https://via.placeholder.com/300x200?text=2" alt="Darbs 2">
            <img id="img3" src="https://via.placeholder.com/300x200?text=3" alt="Darbs 3">
            <img id="img4" src="https://via.placeholder.com/300x200?text=4" alt="Darbs 4">
            <img id="img5" src="https://via.placeholder.com/300x200?text=5" alt="Darbs 5">
            <img id="img6" src="https://via.placeholder.com/300x200?text=6" alt="Darbs 6">
        </div>
    </section>
</main>

<footer>
    <p>© 2026 Katrīna Līva</p>
    <div>
        <a href="https://www.instagram.com/k.lllv/" target="_blank">Instagram</a> |
        <a href="#">Youtube</a> |
        <a href="#">Facebook</a>
    </div>
</footer>

</body>
</html>
